<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Image Split App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-size: cover;
  background-position: center;
}

#topBar {
  display: flex;
  gap: 10px;
  padding: 10px;
  background: #222;
  color: white;
}

button {
  cursor: pointer;
}

#dropZone {
  border: 2px dashed #666;
  padding: 15px;
  text-align: center;
  background: white;
  margin: 10px;
}

#grid {
  display: grid;
  gap: 6px;
  height: calc(100vh - 180px);
  padding: 10px;
}

.imgBox {
  position: relative;
}

img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 8px;
}

.deleteBtn {
  position: absolute;
  top: 5px;
  right: 5px;
  background: red;
  color: white;
  border: none;
  border-radius: 50%;
  width: 25px;
  height: 25px;
}

.slider {
  position: absolute;
  bottom: 5px;
  left: 5px;
  width: 80%;
}
</style>
</head>

<body>

<div id="topBar">
  <button id="bgBtn">Set Background</button>
  <button onclick="exportImage()">Export Image</button>
  <button onclick="openFullscreen()">Full Screen</button>
</div>

<div id="dropZone">📂 Drag & Drop Images Here</div>
<div id="grid"></div>

<script>
let images = [];

const dropZone = document.getElementById('dropZone');
const grid = document.getElementById('grid');
const bgBtn = document.getElementById('bgBtn');

// DRAG IN
dropZone.addEventListener('dragover', e => e.preventDefault());
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

// BACKGROUND
bgBtn.addEventListener('dragover', e => e.preventDefault());
bgBtn.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  const reader = new FileReader();
  reader.onload = e => {
    document.body.style.backgroundImage = `url(${e.target.result})`;
  };
  reader.readAsDataURL(file);
});

function handleFiles(files) {
  for (let file of files) {
    if (file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = e => {
        images.push({ src: e.target.result, size: 1 });
        renderGrid();
      };
      reader.readAsDataURL(file);
    }
  }
}

// RENDER GRID
function renderGrid() {
  grid.innerHTML = '';

  let cols = Math.ceil(Math.sqrt(images.length || 1));
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  images.forEach((imgData, index) => {
    const box = document.createElement('div');
    box.className = 'imgBox';
    box.draggable = true;

    // DRAG REORDER
    box.ondragstart = () => box.dataset.index = index;
    box.ondrop = e => {
      e.preventDefault();
      let from = e.dataTransfer.getData("text");
      let to = index;
      [images[from], images[to]] = [images[to], images[from]];
      renderGrid();
    };
    box.ondragover = e => {
      e.preventDefault();
      e.dataTransfer.setData("text", index);
    };

    const img = document.createElement('img');
    img.src = imgData.src;
    img.style.transform = `scale(${imgData.size})`;

    // DELETE
    const del = document.createElement('button');
    del.className = 'deleteBtn';
    del.innerText = '×';
    del.onclick = () => {
      images.splice(index, 1);
      renderGrid();
    };

    // RESIZE
    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = 0.5;
    slider.max = 2;
    slider.step = 0.1;
    slider.value = imgData.size;
    slider.className = 'slider';

    slider.oninput = () => {
      images[index].size = slider.value;
      renderGrid();
    };

    box.appendChild(img);
    box.appendChild(del);
    box.appendChild(slider);
    grid.appendChild(box);
  });
}

// EXPORT IMAGE
function exportImage() {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  let cols = Math.ceil(Math.sqrt(images.length));
  let size = 300;

  canvas.width = cols * size;
  canvas.height = cols * size;

  images.forEach((imgData, i) => {
    let img = new Image();
    img.src = imgData.src;

    img.onload = () => {
      let x = (i % cols) * size;
      let y = Math.floor(i / cols) * size;
      ctx.drawImage(img, x, y, size, size);
    };
  });

  setTimeout(() => {
    const link = document.createElement('a');
    link.download = 'collage.png';
    link.href = canvas.toDataURL();
    link.click();
  }, 500);
}

// FULL SCREEN TAB
function openFullscreen() {
  let newTab = window.open();
  let html = `<html><body style="margin:0;display:grid;grid-template-columns:repeat(auto-fit,1fr);">`;

  images.forEach(img => {
    html += `<img src="${img.src}" style="width:100%;height:100%;object-fit:cover;">`;
  });

  html += "</body></html>";
  newTab.document.write(html);
}
</script>

</body>
</html>
