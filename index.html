<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Framed 2/4 Image Collage</title>
<style>
html, body {
  margin: 0;
  height: 100%;
  width: 100%;
  font-family: Arial, sans-serif;
  overflow: hidden;
  background-size: cover;
  background-position: center;
}

#topBar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  background: #222;
  color: white;
  flex-wrap: wrap;
}

button, input[type=range] {
  cursor: pointer;
}

#dropZone {
  border: 2px dashed #666;
  padding: 10px;
  text-align: center;
  background: white;
  margin: 10px;
}

#removeButtons {
  display: flex;
  gap: 10px;
  padding: 10px;
  flex-wrap: wrap;
}

#grid {
  position: relative;
  width: 100vw;
  height: calc(100vh - 140px);
}

#grid img.contentImage {
  position: absolute;
  object-fit: cover;
}

#grid img.frameImage {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="topBar">
  <button id="bgBtn">Set Background</button>
  <label>Collage Scale:</label>
  <input type="range" id="sizeSlider" min="0.5" max="2" step="0.01" value="1">
  <button onclick="exportImage()">Export Image</button>
  <button onclick="openFullscreen()">Full Screen</button>
</div>

<div id="dropZone">📂 Drag & Drop Images Here (Max 4)</div>
<div id="removeButtons"></div>
<div id="grid"></div>

<script>
let images = [];
let collageScale = 1;

// Replace these URLs with hosted versions of your frames
const frame2URL = "https://example.com/STD_SPLIT_FRAME.png";
const frame4URL = "https://example.com/STD_MULTIVIEW_FRAME_4.png";

const dropZone = document.getElementById('dropZone');
const grid = document.getElementById('grid');
const bgBtn = document.getElementById('bgBtn');
const sizeSlider = document.getElementById('sizeSlider');
const removeButtonsDiv = document.getElementById('removeButtons');

// Drag & drop images
dropZone.addEventListener('dragover', e => e.preventDefault());
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

// Background
bgBtn.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = ev => {
        document.body.style.backgroundImage = `url(${ev.target.result})`;
      };
      reader.readAsDataURL(file);
    }
  };
  input.click();
});

// Handle files
function handleFiles(files) {
  for (let file of files) {
    if (file.type.startsWith('image/') && images.length < 4) {
      const reader = new FileReader();
      reader.onload = e => {
        images.push({ src: e.target.result });
        renderGrid();
      };
      reader.readAsDataURL(file);
    }
  }
}

// Render collage with frame overlay
function renderGrid() {
  grid.innerHTML = '';
  const frameURL = images.length === 2 ? frame2URL : frame4URL;
  const positions = getPositions(images.length);

  images.forEach((imgData, i) => {
    const img = document.createElement('img');
    img.src = imgData.src;
    img.className = "contentImage";
    img.style.left = positions[i].x * collageScale + "px";
    img.style.top = positions[i].y * collageScale + "px";
    img.style.width = positions[i].w * collageScale + "px";
    img.style.height = positions[i].h * collageScale + "px";
    grid.appendChild(img);
  });

  // Add frame overlay
  const frame = document.createElement('img');
  frame.src = frameURL;
  frame.className = "frameImage";
  grid.appendChild(frame);

  // Remove buttons
  removeButtonsDiv.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const btn = document.createElement('button');
    btn.innerText = `Remove Image ${i + 1}`;
    btn.disabled = !images[i];
    btn.onclick = () => {
      if (images[i]) {
        images.splice(i, 1);
        renderGrid();
      }
    };
    removeButtonsDiv.appendChild(btn);
  }
}

// Define exact positions for each frame
function getPositions(count) {
  const w = grid.clientWidth;
  const h = grid.clientHeight;
  if (count === 2) {
    // Split frame positions
    return [
      { x: 0, y: 0, w: w/2, h: h },
      { x: w/2, y: 0, w: w/2, h: h }
    ];
  } else {
    // 4-image frame positions (2x2)
    return [
      { x: 0, y: 0, w: w/2, h: h/2 },
      { x: w/2, y: 0, w: w/2, h: h/2 },
      { x: 0, y: h/2, w: w/2, h: h/2 },
      { x: w/2, y: h/2, w: w/2, h: h/2 }
    ];
  }
}

// Universal collage scale
sizeSlider.addEventListener('input', () => {
  collageScale = sizeSlider.value;
  renderGrid();
});

// Export exact view
function exportImage() {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const w = grid.clientWidth;
  const h = grid.clientHeight;
  canvas.width = w;
  canvas.height = h;

  const frameURL = images.length === 2 ? frame2URL : frame4URL;
  const positions = getPositions(images.length);

  images.forEach((imgData, i) => {
    const img = new Image();
    img.src = imgData.src;
    img.onload = () => {
      ctx.drawImage(img,
        positions[i].x * collageScale,
        positions[i].y * collageScale,
        positions[i].w * collageScale,
        positions[i].h * collageScale
      );
    };
  });

  const frame = new Image();
  frame.src = frameURL;
  frame.onload = () => {
    ctx.drawImage(frame, 0, 0, w, h);
    const link = document.createElement('a');
    link.download = 'collage.png';
    link.href = canvas.toDataURL();
    link.click();
  };
}

// Full screen
function openFullscreen() {
  const newTab = window.open();
  const frameURL = images.length === 2 ? frame2URL : frame4URL;
  const positions = getPositions(images.length);
  const w = grid.clientWidth;
  const h = grid.clientHeight;

  let html = `<html><body style="margin:0;position:relative;width:${w}px;height:${h}px;">`;

  images.forEach((imgData, i) => {
    html += `<img src="${imgData.src}" style="position:absolute;left:${positions[i].x}px;top:${positions[i].y}px;width:${positions[i].w}px;height:${positions[i].h}px;object-fit:cover;">`;
  });

  html += `<img src="${frameURL}" style="position:absolute;left:0;top:0;width:${w}px;height:${h}px;pointer-events:none;">`;
  html += `</body></html>`;
  newTab.document.write(html);
}

// Resize handling
window.addEventListener('resize', renderGrid);
</script>

</body>
</html>
